<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Looking Up — Head tilted back, eyes high in head, curious open mouth -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head (tilted back, looking up) -->
    <circle cx="100" cy="48" r="28" fill="white"/>
    <!-- Eyes (positioned high in head, looking upward) -->
    <circle cx="88" cy="35" r="4" fill="black" stroke="none"/>
    <circle cx="112" cy="35" r="4" fill="black" stroke="none"/>
    <!-- Curious eyebrows slightly raised -->
    <path d="M 82 27 Q 88 24 94 27" stroke-width="3" fill="none"/>
    <path d="M 106 27 Q 112 24 118 27" stroke-width="3" fill="none"/>
    <!-- Mouth (curious small open) -->
    <ellipse cx="100" cy="60" rx="6" ry="5" fill="black" stroke="none"/>
    <!-- Neck (leaning back slightly) -->
    <path d="M 100 76 Q 100 82 100 92"/>
    <!-- Body (slight lean back) -->
    <path d="M 100 92 Q 101 114 101 136 Q 100 158 100 178"/>
    <!-- Left arm — relaxed, hanging slightly back -->
    <path d="M 100 112 Q 84 130 72 152 Q 66 162 62 172"/>
    <!-- Left hand -->
    <circle cx="62" cy="172" r="6" fill="white"/>
    <!-- Right arm — relaxed, hanging slightly back -->
    <path d="M 100 112 Q 116 130 128 152 Q 134 162 138 172"/>
    <!-- Right hand -->
    <circle cx="138" cy="172" r="6" fill="white"/>
    <!-- Left leg -->
    <path d="M 100 178 Q 93 208 86 242 Q 82 258 79 274"/>
    <!-- Left foot -->
    <ellipse cx="75" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Right leg -->
    <path d="M 100 178 Q 107 208 114 242 Q 118 258 121 274"/>
    <!-- Right foot -->
    <ellipse cx="125" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Gaze lines upward -->
    <path d="M 94 20 Q 92 12 90 4" stroke-width="3" opacity="0.4"/>
    <path d="M 100 18 Q 100 10 100 2" stroke-width="3" opacity="0.4"/>
    <path d="M 106 20 Q 108 12 110 4" stroke-width="3" opacity="0.4"/>
  </g>
</svg>