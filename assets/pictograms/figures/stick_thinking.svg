<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Thinking — Hand on chin, slightly tilted head, puzzled mouth -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head (slightly tilted right) -->
    <circle cx="106" cy="45" r="28" fill="white"/>
    <!-- Eyes (looking up and to the side, thinking) -->
    <circle cx="97" cy="37" r="4" fill="black" stroke="none"/>
    <circle cx="117" cy="36" r="4" fill="black" stroke="none"/>
    <!-- Right eyebrow raised -->
    <path d="M 113 26 Q 118 22 123 26" stroke-width="3" fill="none"/>
    <!-- Mouth (pursed/puzzled — small pucker) -->
    <path d="M 101 57 Q 106 54 110 57 Q 112 60 109 62" stroke-width="4" fill="none"/>
    <!-- Neck -->
    <path d="M 106 73 Q 104 79 102 88"/>
    <!-- Body -->
    <path d="M 102 88 Q 103 110 102 132 Q 100 155 100 175"/>
    <!-- Left arm — relaxed at side -->
    <path d="M 101 108 Q 86 128 74 150 Q 68 160 64 170"/>
    <!-- Left hand -->
    <circle cx="64" cy="170" r="6" fill="white"/>
    <!-- Right arm — bent up to chin -->
    <path d="M 101 110 Q 118 112 126 100 Q 132 88 124 76 Q 120 72 117 68"/>
    <!-- Right hand resting on chin -->
    <circle cx="117" cy="68" r="6" fill="white"/>
    <!-- Left leg -->
    <path d="M 100 175 Q 92 205 85 240 Q 81 258 78 274"/>
    <!-- Left foot -->
    <ellipse cx="74" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Right leg -->
    <path d="M 100 175 Q 108 205 115 240 Q 119 258 122 274"/>
    <!-- Right foot -->
    <ellipse cx="126" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Thought bubbles -->
    <circle cx="142" cy="30" r="3" fill="black" stroke="none"/>
    <circle cx="153" cy="20" r="4.5" fill="black" stroke="none"/>
    <circle cx="167" cy="10" r="6" fill="black" stroke="none"/>
  </g>
</svg>