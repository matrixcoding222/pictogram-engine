<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Scared — Leaning back, arms up defensively, wide eyes, O mouth -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head (leaning back slightly) -->
    <circle cx="112" cy="45" r="28" fill="white"/>
    <!-- Eyes (wide open scared — larger radius) -->
    <circle cx="102" cy="38" r="5" fill="black" stroke="none"/>
    <circle cx="122" cy="38" r="5" fill="black" stroke="none"/>
    <!-- Eye highlights (fear glints) -->
    <circle cx="103" cy="37" r="1.5" fill="white" stroke="none"/>
    <circle cx="123" cy="37" r="1.5" fill="white" stroke="none"/>
    <!-- Eyebrows raised high in shock -->
    <path d="M 95 26 Q 102 20 109 26" stroke-width="3" fill="none"/>
    <path d="M 115 26 Q 122 20 129 26" stroke-width="3" fill="none"/>
    <!-- Mouth (wide open O — scared) -->
    <ellipse cx="112" cy="58" rx="9" ry="10" fill="black" stroke="none"/>
    <!-- Neck (leaning back) -->
    <path d="M 112 73 Q 109 79 106 88"/>
    <!-- Body (leaning backward) -->
    <path d="M 106 88 Q 109 110 112 132 Q 114 155 116 175"/>
    <!-- Left arm — up defensively in front -->
    <path d="M 107 106 Q 82 90 66 72 Q 58 64 54 56"/>
    <!-- Left hand -->
    <circle cx="54" cy="56" r="6" fill="white"/>
    <!-- Right arm — up defensively in front -->
    <path d="M 107 106 Q 96 86 88 70 Q 84 62 82 54"/>
    <!-- Right hand -->
    <circle cx="82" cy="54" r="6" fill="white"/>
    <!-- Left leg (stepping back) -->
    <path d="M 116 175 Q 106 205 96 240 Q 90 258 86 274"/>
    <!-- Left foot -->
    <ellipse cx="82" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Right leg -->
    <path d="M 116 175 Q 124 205 130 240 Q 133 258 135 274"/>
    <!-- Right foot -->
    <ellipse cx="139" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Scare/shock lines radiating -->
    <path d="M 144 28 L 156 20" stroke-width="3"/>
    <path d="M 146 42 L 160 38" stroke-width="3"/>
    <path d="M 143 56 L 155 60" stroke-width="3"/>
  </g>
</svg>