<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Pointing — Confident pose, right arm extended pointing right, slight smile -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="90" cy="45" r="28" fill="white"/>
    <!-- Eyes (confident) -->
    <circle cx="80" cy="40" r="4" fill="black" stroke="none"/>
    <circle cx="102" cy="40" r="4" fill="black" stroke="none"/>
    <!-- Mouth (slight confident smile) -->
    <path d="M 78 56 Q 90 65 102 56" stroke-width="4" fill="none"/>
    <!-- Neck -->
    <path d="M 90 73 Q 91 79 90 88"/>
    <!-- Body -->
    <path d="M 90 88 Q 92 110 91 132 Q 89 155 90 175"/>
    <!-- Left arm — relaxed at side -->
    <path d="M 90 108 Q 76 128 64 150 Q 58 160 54 170"/>
    <!-- Left hand -->
    <circle cx="54" cy="170" r="6" fill="white"/>
    <!-- Right arm — extended pointing right -->
    <path d="M 90 110 Q 115 106 140 100 Q 158 96 172 92"/>
    <!-- Right hand (pointing) -->
    <circle cx="172" cy="92" r="6" fill="white"/>
    <!-- Pointing finger extending from hand -->
    <path d="M 178 91 L 192 88" stroke-width="4"/>
    <!-- Left leg -->
    <path d="M 90 175 Q 83 205 76 240 Q 72 258 69 274"/>
    <!-- Left foot -->
    <ellipse cx="65" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Right leg -->
    <path d="M 90 175 Q 97 205 104 240 Q 108 258 111 274"/>
    <!-- Right foot -->
    <ellipse cx="115" cy="280" rx="13" ry="7" fill="white"/>
  </g>
</svg>