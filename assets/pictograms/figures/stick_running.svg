<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Running — Dynamic leaning forward, mid-stride, determined face -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head (leaning forward with momentum) -->
    <circle cx="118" cy="40" r="28" fill="white"/>
    <!-- Eyes (determined, focused forward) -->
    <circle cx="110" cy="35" r="4" fill="black" stroke="none"/>
    <circle cx="130" cy="35" r="4" fill="black" stroke="none"/>
    <!-- Determined eyebrows (angled inward for intensity) -->
    <path d="M 104 27 L 114 24" stroke-width="3"/>
    <path d="M 126 24 L 136 27" stroke-width="3"/>
    <!-- Mouth (determined grit) -->
    <path d="M 108 50 Q 118 55 128 50" stroke-width="4" fill="none"/>
    <!-- Neck (angled forward) -->
    <path d="M 118 68 Q 114 76 108 86"/>
    <!-- Body (leaning forward dynamically) -->
    <path d="M 108 86 Q 102 112 96 138 Q 92 155 88 170"/>
    <!-- Left arm — swinging back -->
    <path d="M 104 106 Q 82 118 62 135 Q 52 144 44 152"/>
    <!-- Left hand -->
    <circle cx="44" cy="152" r="6" fill="white"/>
    <!-- Right arm — swinging forward -->
    <path d="M 104 106 Q 126 96 146 84 Q 156 78 164 72"/>
    <!-- Right hand -->
    <circle cx="164" cy="72" r="6" fill="white"/>
    <!-- Left leg — back leg extended behind -->
    <path d="M 88 170 Q 70 194 52 222 Q 42 240 36 258"/>
    <!-- Left foot -->
    <ellipse cx="32" cy="264" rx="13" ry="7" fill="white"/>
    <!-- Right leg — front leg striding forward -->
    <path d="M 88 170 Q 108 198 130 228 Q 142 248 150 264"/>
    <!-- Right foot -->
    <ellipse cx="155" cy="269" rx="13" ry="7" fill="white"/>
    <!-- Motion speed lines behind -->
    <path d="M 28 42 L 12 42" stroke-width="3" opacity="0.5"/>
    <path d="M 26 52 L 6 52" stroke-width="3" opacity="0.5"/>
    <path d="M 30 62 L 14 62" stroke-width="3" opacity="0.5"/>
  </g>
</svg>