<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stick Sitting — Seated on implied surface, legs horizontal then down, relaxed smile -->
  <g fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="90" cy="45" r="28" fill="white"/>
    <!-- Eyes (relaxed) -->
    <circle cx="78" cy="40" r="4" fill="black" stroke="none"/>
    <circle cx="100" cy="40" r="4" fill="black" stroke="none"/>
    <!-- Mouth (relaxed gentle smile) -->
    <path d="M 78 56 Q 90 64 102 56" stroke-width="4" fill="none"/>
    <!-- Neck -->
    <path d="M 90 73 Q 90 79 90 88"/>
    <!-- Body (upright sitting) -->
    <path d="M 90 88 Q 91 108 90 128 Q 89 148 90 165"/>
    <!-- Left arm — resting on lap -->
    <path d="M 90 110 Q 72 122 60 138 Q 56 145 54 152"/>
    <!-- Left hand on lap -->
    <circle cx="54" cy="152" r="6" fill="white"/>
    <!-- Right arm — resting on side -->
    <path d="M 90 110 Q 106 122 118 138 Q 122 145 124 152"/>
    <!-- Right hand -->
    <circle cx="124" cy="152" r="6" fill="white"/>
    <!-- Thighs — horizontal (seated) -->
    <path d="M 90 165 Q 110 166 130 168 Q 148 170 160 172"/>
    <!-- Lower left leg — hanging down from seat edge -->
    <path d="M 160 172 Q 162 205 163 238 Q 163 258 164 274"/>
    <!-- Left foot (at bottom of hanging leg) -->
    <ellipse cx="168" cy="280" rx="13" ry="7" fill="white"/>
    <!-- Seat surface line (implied chair/bench) -->
    <path d="M 55 170 Q 100 172 145 172 Q 165 173 175 174" stroke-width="4" opacity="0.4"/>
    <!-- Back support hint -->
    <path d="M 58 88 Q 56 120 55 155 Q 55 163 55 170" stroke-width="4" opacity="0.4"/>
  </g>
</svg>