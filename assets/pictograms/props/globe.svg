<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Globe - with latitude/longitude grid, hand-drawn doodle style -->
  <!-- Globe stand base -->
  <path d="M66 178 L134 178 L128 186 L72 186 Z" fill="#8D6E63" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stand vertical -->
  <line x1="100" y1="158" x2="100" y2="178" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Globe circle - ocean fill -->
  <circle cx="100" cy="88" r="68" fill="#BBDEFB" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Land masses (stylized continents) -->
  <path d="M72 42 Q78 36 88 38 Q96 34 100 40 Q108 38 112 44 Q118 48 114 56 Q120 62 116 68 Q110 72 104 68 Q96 74 88 70 Q80 72 76 64 Q68 58 72 48 Z"
        fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
  <path d="M120 82 Q130 76 140 80 Q148 86 144 96 Q140 104 130 106 Q122 102 118 94 Q116 86 120 82 Z"
        fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
  <path d="M60 90 Q66 84 76 88 Q82 94 80 104 Q76 112 66 114 Q58 108 56 100 Q56 94 60 90 Z"
        fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
  <path d="M86 118 Q96 112 108 116 Q116 122 112 132 Q106 138 96 136 Q86 132 84 124 Z"
        fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
  <!-- Equator -->
  <ellipse cx="100" cy="90" rx="68" ry="18" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Prime meridian -->
  <ellipse cx="100" cy="88" rx="22" ry="68" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Latitude lines -->
  <ellipse cx="100" cy="52" rx="56" ry="14" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <ellipse cx="100" cy="124" rx="56" ry="14" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Globe stand arc -->
  <path d="M56 160 Q56 148 68 140 Q82 132 100 130" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <path d="M144 160 Q144 148 132 140 Q118 132 100 130" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Highlight reflection -->
  <path d="M62 50 Q72 36 90 32" fill="none" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
</svg>
