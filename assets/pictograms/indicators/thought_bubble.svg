<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Thought bubble - cloud shape with trailing dots, hand-drawn doodle style -->
  <!-- Cloud body fill -->
  <path d="M52 100 Q28 100 26 78 Q24 54 48 48 Q50 28 78 24 Q100 20 118 28 Q136 22 150 34 Q168 38 170 58 Q184 64 182 84 Q180 102 162 106 Q158 120 140 118 Q130 126 112 120 Q96 128 78 122 Q58 122 52 100 Z"
        fill="#F5F5F5" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
