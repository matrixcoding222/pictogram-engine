<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Arrow down - thick bold with filled arrowhead, hand-drawn doodle style -->
  <!-- Arrow shaft with slight wobble -->
  <path d="M102 22 Q100 60 98 100 Q96 130 100 142"
        fill="none" stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Filled arrowhead -->
  <path d="M62 134 L100 178 L138 134 Z"
        fill="#424242" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Highlight on arrowhead -->
  <path d="M78 142 L100 162 L120 142"
        fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
