  <!-- S fill hint -->
  <path d="M152 66 Q148 56 138 54 Q126 50 118 58 Q110 66 118 76 Q126 84 138 90 Q150 96 152 110 Q154 124 144 130 Q132 138 120 136 Q110 132 106 124"
        fill="#BBDEFB" opacity="0.4" stroke="none"/>
</svg>
